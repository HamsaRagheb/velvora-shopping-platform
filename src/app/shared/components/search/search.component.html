<div class="container">
  <div class="search py-4">
    <div class="row g-4" *ngIf="searchResults.length > 0; else noResults">
      <div class="col-lg-3" *ngFor="let product of searchResults">
        <div class="search-item">
          <app-product [product]="product"></app-product>
        </div>
      </div>
    </div>
    <ng-template #noResults>
      <div class="p-3 text-muted text-center" *ngIf="searchQuery.trim()">
        No products found for "{{ searchQuery }}"
      </div>
    </ng-template>
  </div>
</div>
