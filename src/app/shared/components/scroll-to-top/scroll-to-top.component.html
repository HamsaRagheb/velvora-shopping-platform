<div
  *ngIf="isVisable"
  class="to-top-wrapper rounded-circle d-flex justify-content-center align-items-center"
>
  <button
    (click)="scrollToTop()"
    type="button"
    class="bg-transparent border-0 text-white"
    aria-label="Scroll To Top"
  >
    <i class="fa-solid fa-angles-up"></i>
  </button>
</div>
